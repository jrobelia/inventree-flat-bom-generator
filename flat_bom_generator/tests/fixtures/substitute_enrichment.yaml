# Fixture for substitute enrichment integration tests
# This fixture bypasses InvenTree's Part.check_add_to_bom() validation
# which rejects dynamic BOM creation in tests.
#
# Test Scenario:
# - Assembly (pk=8001) with BOM linking to Primary part (pk=8002)
# - Primary part has 2 substitutes (pk=8003, 8004)
# - StockItems: Primary=50 (allocated=10), Sub1=100, Sub2=25
#
# Usage: call_command('loaddata', absolute_path, verbosity=0)

# PartCategory
- model: part.PartCategory
  pk: 8001
